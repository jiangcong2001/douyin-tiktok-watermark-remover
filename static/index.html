<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>去水印工具 - 抖音/TikTok/快手/B站/Instagram/YouTube</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#fff;min-height:100vh}
.app{max-width:680px;margin:0 auto;padding:24px 16px 80px}
.header{text-align:center;padding:48px 0 32px}
.header h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#fe2c55,#25f4ee,#ff0050,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:#888;margin-top:8px;font-size:14px}
.input-box{background:#1a1a1a;border-radius:16px;padding:20px;border:1px solid #2a2a2a}
.input-row{display:flex;gap:10px}
.url-input{flex:1;padding:14px 16px;border:2px solid #2a2a2a;border-radius:12px;font-size:15px;background:#0f0f0f;color:#fff;outline:none;transition:border-color .2s}
.url-input:focus{border-color:#fe2c55}
.url-input::placeholder{color:#555}
.btn{min-width:100px;padding:14px 20px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-parse{background:linear-gradient(135deg,#fe2c55,#ff0050);color:#fff}
.btn-parse:hover{opacity:.9;transform:scale(1.02)}
.btn-parse:disabled{opacity:.4;transform:none;cursor:not-allowed}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{background:#2a1015;border:1px solid #fe2c55;border-radius:12px;padding:14px 18px;margin-top:16px;color:#fe2c55;font-size:14px}
.result{background:#1a1a1a;border-radius:16px;padding:24px;border:1px solid #2a2a2a;margin-top:16px}
.platform-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:12px}
.platform-douyin{background:#111;color:#fff;border:1px solid #fe2c55}
.platform-tiktok{background:#000;color:#fff;border:1px solid #25f4ee}
.platform-kuaishou{background:#ff4906;color:#fff}
.platform-bilibili{background:#fb7299;color:#fff}
.platform-instagram{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff}
.platform-youtube{background:#ff0000;color:#fff}
.platform-xiaohongshu{background:#ff2442;color:#fff}
.platform-weibo{background:#e6162d;color:#fff}
.platform-generic{background:#444;color:#fff}
.result-title{font-size:18px;font-weight:600;margin-bottom:12px;line-height:1.5;word-break:break-word}
.result-author{color:#888;font-size:13px;margin-bottom:16px}
.media-preview{border-radius:12px;overflow:hidden;margin-bottom:16px;background:#000}
.media-preview img,.media-preview video,.media-preview iframe{width:100%;max-height:480px;object-fit:contain;display:block;border:none}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-action{padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none;display:inline-block}
.btn-download{background:#fe2c55;color:#fff}
.btn-download:hover{opacity:.9}
.btn-copy{background:#2a2a2a;color:#fff}
.btn-copy:hover{background:#333}
.btn-open{background:transparent;color:#fe2c55;border:1px solid #fe2c55}
.btn-open:hover{background:rgba(254,44,85,.1)}
.images-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:12px}
.image-card{border-radius:10px;overflow:hidden;background:#0f0f0f;border:1px solid #2a2a2a}
.image-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.image-card .img-btn{display:block;width:100%;padding:8px;background:#fe2c55;color:#fff;border:none;font-size:12px;font-weight:600;cursor:pointer}
.fallback{background:#2a1015;border:1px solid #ff6b6b;border-radius:8px;padding:14px;margin-top:12px}
.fallback p{font-size:13px;color:#ff6b6b;line-height:1.6;margin-bottom:4px}
.fallback p:last-child{margin-bottom:0}
.fallback .hint{color:#8a8;font-size:12px}
.tips{background:#1a1a1a;border-radius:16px;padding:24px;border:1px solid #2a2a2a;margin-top:24px}
.tips h3{font-size:16px;font-weight:700;margin-bottom:12px}
.tips ul{padding-left:20px;color:#888}
.tips li{margin-bottom:8px;font-size:14px;line-height:1.6}
.tips .platforms{margin-top:16px;padding-top:16px;border-top:1px solid #2a2a2a;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.tips .plat-item{font-size:13px;color:#666;padding:6px 12px;background:#0f0f0f;border-radius:8px;text-align:center}
.footer{text-align:center;margin-top:32px;padding:16px;color:#444;font-size:12px}
.footer a{color:#666;text-decoration:none}
@media(max-width:480px){
  .header h1{font-size:24px}
  .input-row{flex-direction:column}
  .btn{min-width:auto}
  .actions{flex-direction:column}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>去水印工具</h1>
    <p>解析抖音/TikTok/快手/B站/Instagram/YouTube/小红书/微博等平台链接</p>
  </div>
  <div class="input-box">
    <div class="input-row">
      <input id="urlInput" class="url-input" placeholder="粘贴视频分享链接..." autofocus>
      <button id="parseBtn" class="btn btn-parse" onclick="parseUrl()">解析</button>
    </div>
  </div>
  <div id="errorArea"></div>
  <div id="resultArea"></div>
  <div class="tips">
    <h3>使用说明</h3>
    <ul>
      <li>在抖音/TikTok/快手/B站/Instagram/YouTube 等平台复制分享链接</li>
      <li>粘贴到上方输入框，点击"解析"</li>
      <li>获取无水印视频/图片，直接下载或复制链接</li>
    </ul>
    <div class="platforms">
      <div class="plat-item">抖音</div>
      <div class="plat-item">TikTok</div>
      <div class="plat-item">快手</div>
      <div class="plat-item">B站</div>
      <div class="plat-item">Instagram</div>
      <div class="plat-item">YouTube</div>
      <div class="plat-item">小红书</div>
      <div class="plat-item">微博</div>
    </div>
    <div style="margin-top:12px;padding:12px;background:#0f0f0f;border-radius:8px;font-size:12px;color:#666;line-height:1.6">
      由于Vercel免费版限制，抖音/TikTok解析可能因风控失败。
      部署时在项目配置中填写有效Cookie即可正常工作。
    </div>
  </div>
  <div class="footer">
    GitHub: <a href="https://github.com/jiangcong2001/douyin-tiktok-watermark-remover" target="_blank">douyin-tiktok-watermark-remover</a>
  </div>
</div>
<script>
const PLATFORM_LABELS = { douyin:'抖音', tiktok:'TikTok', kuaishou:'快手', bilibili:'哔哩哔哩', instagram:'Instagram', youtube:'YouTube', xiaohongshu:'小红书', weibo:'微博', generic:'网页' };

async function parseUrl() {
  const input = document.getElementById('urlInput');
  const btn = document.getElementById('parseBtn');
  const errorArea = document.getElementById('errorArea');
  const resultArea = document.getElementById('resultArea');
  const url = input.value.trim();
  if (!url) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  errorArea.innerHTML = '';
  resultArea.innerHTML = '';

  try {
    const resp = await fetch('/api/parse', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url})
    });
    const json = await resp.json();
    if (json.success) {
      renderResult(json.data);
    } else {
      errorArea.innerHTML = '<div class="error">' + (json.error || '解析失败') + '</div>';
    }
  } catch(e) {
    errorArea.innerHTML = '<div class="error">网络错误，请检查连接</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '解析';
  }
}

function proxyUrl(url) {
  if (!url) return '';
  if (url.startsWith('/api/')) return url;
  return '/api/proxy?url=' + encodeURIComponent(url);
}

function renderResult(data) {
  const p = data.platform;
  const label = PLATFORM_LABELS[p] || p;
  const badge = '<span class="platform-badge platform-' + p + '">' + label + '</span>';
  let html = '<div class="result">' + badge;

  if (data.title) html += '<div class="result-title">' + esc(data.title) + '</div>';
  if (data.author) html += '<div class="result-author">@' + esc(data.author) + '</div>';

  if (data.embed) {
    html += '<div class="media-preview">' + data.embed + '</div>';
  }

  if (data.video_url) {
    const proxied = proxyUrl(data.video_url);
    html += '<div class="media-preview"><video controls preload="metadata" poster="' + (data.cover||'') + '" crossorigin="anonymous"><source src="' + proxied + '" type="video/mp4"></video></div>';
    html += '<div class="actions">' +
      '<button class="btn-action btn-download" onclick="downloadMedia(\'' + esc_attr(data.video_url) + '\',\'video.mp4\')">下载视频</button>' +
      '<button class="btn-action btn-copy" onclick="copyUrl(\'' + esc_attr(data.video_url) + '\')">复制链接</button>' +
      '<a class="btn-action btn-open" href="' + proxied + '" target="_blank">新窗口打开</a>' +
      '</div>';
  }

  if (data.images && data.images.length > 0) {
    html += '<div class="images-grid">';
    data.images.forEach(function(img,i) {
      html += '<div class="image-card">' +
        '<img src="' + proxyUrl(img) + '" loading="lazy" onerror="this.style.display=\'none\'">' +
        '<button class="img-btn" onclick="downloadMedia(\'' + esc_attr(img) + '\',\'image-' + (i+1) + '.jpg\')">下载</button>' +
        '</div>';
    });
    html += '</div>';
  }

  if (data.error) {
    html += '<div class="fallback"><p>' + esc(data.error) + '</p><p class="hint">请确认链接正确，若为抖音/TikTok则可能需要配置Cookie</p></div>';
  }

  if (!data.video_url && (!data.images || data.images.length === 0) && !data.embed && !data.error) {
    html += '<div class="fallback"><p>未能提取到媒体内容，该平台可能需要Cookie</p></div>';
  }

  html += '</div>';
  document.getElementById('resultArea').innerHTML = html;
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function esc_attr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function downloadMedia(url, filename) {
  var a = document.createElement('a');
  a.href = '/api/proxy?url=' + encodeURIComponent(url) + '&dl=' + encodeURIComponent(filename);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function copyUrl(url) {
  navigator.clipboard.writeText(url).then(function() {
    var btns = document.querySelectorAll('.btn-copy');
    btns.forEach(function(b) { b.textContent = '已复制'; });
    setTimeout(function() { btns.forEach(function(b) { b.textContent = '复制链接'; }); }, 2000);
  });
}

document.getElementById('urlInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') parseUrl();
});
</script>
</body>
</html>
